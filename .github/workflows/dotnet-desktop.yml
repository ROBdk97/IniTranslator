name: .NET Build and Release
on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ./IniTranslator/IniTranslator.csproj -r win-x64
        
      - name: Publish
        run: dotnet publish ./IniTranslator/IniTranslator.csproj -c Release -r win-x64 --no-restore -o publish -p:DebugType=None -p:PublishSingleFile=true --self-contained true
        
      - name: Compress Published Files
        shell: powershell
        run: Compress-Archive -Path publish\* -DestinationPath Release.zip

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Release
          path: Release.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Release.zip
